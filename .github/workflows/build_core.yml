name: Build Libcore
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Golang
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25
      - name: Build Libcore
        run: ./run lib core
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcore
          path: app/libs/libcore.aar
